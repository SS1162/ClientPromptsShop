<div class="ep-card">

  <!-- ── Header ─────────────────────────────────── -->
  <div class="ep-header">
    <div class="ep-icon-wrap">
      <i class="pi pi-sparkles"></i>
    </div>
    <div>
      <h3 class="ep-title">Custom AI Design</h3>
      <p class="ep-subtitle">Describe your idea and let Gemini craft it for you</p>
    </div>
  </div>

  <!-- ── Input area (shown only before first generation) ── -->
  @if (!flag) {
    <div class="ep-input-area">
      <p-floatlabel variant="on" class="ep-floatlabel">
        <input pInputText id="productTitle" [(ngModel)]="productTitle" class="ep-title-input" />
        <label for="productTitle">Design title (optional)</label>
      </p-floatlabel>

      <div class="ep-textarea-wrap">
        <textarea
          [(ngModel)]="input"
          rows="3"
          placeholder="E.g. A landing page for a coffee shop with a warm, minimalist feel…"
          class="ep-textarea"
        ></textarea>
      </div>

      <div class="ep-actions">
        <button class="ep-btn ep-btn-primary" (click)="generate()" [disabled]="!input?.trim()">
          <i class="pi pi-send"></i> Generate Design
        </button>
      </div>
    </div>
  }

  <!-- ── Generating loader ──────────────────────── -->
  @if (flag && !prompt) {
    <div class="ep-loading">
      <span class="ep-spinner"></span>
      <span class="ep-loading-text">Gemini is crafting your design…</span>
    </div>
  }

  <!-- ── Result: inline-editable prompt + actions ── -->
  @if (flag && prompt) {
    <div class="ep-result">
      <div class="ep-result-label">
        <i class="pi pi-check-circle"></i> Your design prompt — edit directly if needed
      </div>

      <div class="ep-textarea-wrap">
        <textarea
          [(ngModel)]="editablePrompt"
          rows="5"
          class="ep-textarea ep-textarea-result"
          placeholder="Edit your prompt here…"
        ></textarea>
      </div>

      @if (price) {
        <div class="ep-price-row">
          <i class="pi pi-tag"></i>
          <span>Price: <strong>{{ price | currency }}</strong></span>
        </div>
      }

      <div class="ep-actions">
        <button class="ep-btn ep-btn-outline" (click)="update()" [disabled]="isUpdating || !editablePrompt.trim()">
          @if (isUpdating) {
            <i class="pi pi-spin pi-spinner"></i> Updating…
          } @else {
            <i class="pi pi-refresh"></i> Update
          }
        </button>

        <button class="ep-btn ep-btn-ghost" (click)="deletePrompt()">
          <i class="pi pi-times"></i> Cancel
        </button>
      </div>
    </div>
  }

</div>
