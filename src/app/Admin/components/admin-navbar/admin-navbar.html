<nav class="admin-nav">
  <div class="nav-section left" routerLink="/">
    <div class="brand-container">
      <img src="../../../../assets/images/logo.png" alt="icon" class="brand-logo-img">
      <span class="brand-title">Click-Site</span>
      <span class="admin-tag">Admin</span>
    </div>
  </div>

  <div class="nav-section center">
    <a routerLink="dashboard" routerLinkActive="active" class="nav-item">Dashboard</a>
    <a routerLink="site-types" routerLinkActive="active" class="nav-item">Site Types</a>
    <a routerLink="sub-categories" routerLinkActive="active" class="nav-item">Sub Categories</a>
    <a routerLink="main-categories" routerLinkActive="active" class="nav-item">Main Categories</a>
    <a routerLink="products" routerLinkActive="active" class="nav-item">Products</a>
    <a routerLink="orders" routerLinkActive="active" class="nav-item">Orders</a>
  </div>

  <div class="nav-section right">
    <a routerLink="/" class="view-store-link">
      <span>View Store</span>
      <i class="pi pi-external-link"></i>
    </a>
    <button class="logout-btn" (click)="onLogout($event)" title="Logout">
      <i class="pi pi-sign-out"></i>
      <span>Logout</span>
    </button>
  </div>

  <button class="mobile-menu-btn" (click)="toggleMobileMenu()">
    <i class="pi" [ngClass]="mobileMenuOpen ? 'pi-times' : 'pi-bars'"></i>
  </button>
</nav>

<div class="mobile-menu" [ngClass]="{'open': mobileMenuOpen}">
  <a routerLink="dashboard" routerLinkActive="active" class="nav-item" (click)="closeMobileMenu()">
    <i class="pi pi-chart-line"></i> Dashboard
  </a>
  <a routerLink="site-types" routerLinkActive="active" class="nav-item" (click)="closeMobileMenu()">
    <i class="pi pi-globe"></i> Site Types
  </a>
  <a routerLink="sub-categories" routerLinkActive="active" class="nav-item" (click)="closeMobileMenu()">
    <i class="pi pi-folder"></i> Sub Categories
  </a>
  <a routerLink="main-categories" routerLinkActive="active" class="nav-item" (click)="closeMobileMenu()">
    <i class="pi pi-folder-open"></i> Main Categories
  </a>
  <a routerLink="products" routerLinkActive="active" class="nav-item" (click)="closeMobileMenu()">
    <i class="pi pi-box"></i> Products
  </a>
  <a routerLink="orders" routerLinkActive="active" class="nav-item" (click)="closeMobileMenu()">
    <i class="pi pi-shopping-cart"></i> Orders
  </a>
  
  <div class="mobile-actions">
    <a routerLink="/" class="view-store-link" (click)="closeMobileMenu()">
      <i class="pi pi-external-link"></i> View Store
    </a>
    <button class="logout-btn" (click)="onLogout($event); closeMobileMenu()">
      <i class="pi pi-sign-out"></i> Logout
    </button>
  </div>
</div>

<p-toast></p-toast>
<p-confirmDialog key="logoutConfirm"></p-confirmDialog>
