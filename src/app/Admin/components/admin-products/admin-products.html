<div class="admin-container p-4">
  <div class="flex justify-content-between align-items-center mb-4">
    <h1 class="text-3xl font-bold text-slate-900">Products Management</h1>
    <p-button label="Add Product" icon="pi pi-plus" (onClick)="openNew()" styleClass="admin-gradient-btn"></p-button>
  </div>

  <div class="p-card shadow-2 border-round-2xl overflow-hidden" style="margin-top: 1.5rem;">
    <p-table 
      [value]="products" 
      [paginator]="true" 
      [rows]="10" 
      [totalRecords]="totalRecords" 
      [loading]="loading"
      [tableStyle]="{ 'min-width': '60rem' }">
      
      <ng-template pTemplate="header">
        <tr>
          <th>Product</th>
          <th>Category</th>
          <th>Price</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-product>
        <tr>
          <td>
            <div class="flex align-items-center gap-3">
              <img [src]="product.imgUrl ? staticFilesUrl + product.imgUrl : 'assets/images/logo.png'" style="width:32px; height:32px; object-fit:cover; border-radius:6px; flex-shrink:0;" />
              <span class="font-medium">{{ product.ProductsName }}</span>
            </div>
          </td>
          <td>{{ product.CategoryName }}</td>
          <td class="font-bold text-slate-700">{{ product.Price | currency }}</td>
          <td>
            @if (product.isActive) {
              <p-tag severity="success" value="Active"></p-tag>
            } @else {
              <p-tag severity="danger" value="Inactive"></p-tag>
            }
          </td>
          <td>
            <div class="flex gap-2">
              <p-button icon="pi pi-pencil" [outlined]="true" severity="secondary" size="small" [rounded]="true" (onClick)="editProduct(product)" pTooltip="Edit"></p-button>
              <p-button icon="pi pi-trash" [outlined]="true" severity="danger" size="small" [rounded]="true" (onClick)="deleteProduct(product)" pTooltip="Delete"></p-button>
            </div>
          </td>
        </tr>
      </ng-template>

      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="5" class="text-center p-4">No products found.</td>
        </tr>
      </ng-template>
    </p-table>
  </div>

  <p-dialog [(visible)]="productDialog" [style]="{width: '500px'}" header="Product Details" [modal]="true" styleClass="p-fluid product-dialog">
    <ng-template pTemplate="content">
      @if (selectedProduct) {
        <div class="field mb-4">
          <label for="name" class="block font-medium mb-2">Name *</label>
          <input type="text" pInputText id="name" [(ngModel)]="selectedProduct.ProductsName" required autofocus />
          @if (submitted && !selectedProduct.ProductsName) {
            <small class="p-error block">Name is required.</small>
          }
        </div>

        <div class="field mb-4">
          <label for="price" class="block font-medium mb-2">Price</label>
          <p-inputNumber id="price" [(ngModel)]="selectedProduct.Price" mode="currency" currency="USD" locale="en-US"></p-inputNumber>
        </div>

        <div class="field mb-4">
          <label for="description" class="block font-medium mb-2">Description</label>
          <textarea id="description" pInputTextarea [(ngModel)]="selectedProduct.productDescription" rows="3"></textarea>
        </div>

        <div class="field mb-4 flex align-items-center gap-2">
          <label for="isActive" class="font-medium">Active Status:</label>
          <input type="checkbox" id="isActive" [(ngModel)]="selectedProduct.isActive" />
        </div>
      }
    </ng-template>

    <ng-template pTemplate="footer">
      <p-button label="Cancel" icon="pi pi-times" styleClass="p-button-text" (onClick)="hideDialog()"></p-button>
      <p-button label="Save" icon="pi pi-check" (onClick)="saveProduct()"></p-button>
    </ng-template>
  </p-dialog>
</div>

<p-toast></p-toast>
